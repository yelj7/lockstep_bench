# /**********************************************************
# * 文件名: lockstep-zcu102-hs2.cfg
# * 日期: 2026-07-20
# * 版本: 1.0
# * 更新记录: 新增 WinUSB HS2 与 ZynqMP 配置链定义。
# * 描述: 使用开源 OpenOCD 扫描和配置 ZCU102，不依赖 Vivado/Adept。
# **********************************************************/

adapter driver ftdi
ftdi vid_pid 0x0403 0x6014
ftdi channel 0
ftdi layout_init 0x00e8 0x60eb

transport select jtag
reset_config none
adapter speed 1000

set CHIPNAME uscale
source [find target/xilinx_zynqmp.cfg]
pld device virtex2 uscale.ps 1
